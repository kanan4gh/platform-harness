# Optional manual mirror. The required quality gate runs locally.
name: local-quality-gate (optional manual run)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  local-quality-gate:
    name: Optional manual local-quality-gate mirror
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Run the same deterministic gate used locally
        run: uv run python3 scripts/local_quality_gate.py
